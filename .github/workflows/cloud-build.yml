name: OpenCloud Global Build (LS220D)
on: [push] # あなたが git push したら工場が稼働します

jobs:
  armv7-build:
    runs-on: ubuntu-latest # 最新のLinuxサーバーをレンタル
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4 # ソースコード一式を工場に搬入

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # Go職人を呼び出す


      - name: Install ARM Cross-Compiler
        run: |
          # 1. ARMアーキテクチャを追加
          sudo dpkg --add-architecture armhf

          # 2. 標準の sources.list だけを Intel専用に書き換える (他は触らない)
          sudo sed -i 's/^deb /deb [arch=amd64] /g' /etc/apt/sources.list

          # 3. ARM専用倉庫を別のファイルとして独立させる
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -sc) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/armhf.list
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -sc)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/armhf.list
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -sc)-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/armhf.list

          # 4. アップデート
          sudo apt-get update

          # 5. インストール
          sudo apt-get install -y gcc-arm-linux-gnueabihf libcrypt-dev:armhf

      - name: Build All Services
        run: |
          cd opencloud
          go mod vendor

          # CCも「hf」付きを指名！
          CGO_ENABLED=1 \
          GOOS=linux \
          GOARCH=arm \
          GOARM=7 \
          CC=arm-linux-gnueabihf-gcc \
          go build -v -tags 'netgo' -ldflags '-s -w' -o bin/opencloud ./cmd/opencloud



      - name: Archive Production
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-ls220d-binary # 出来上がった製品の名前
          path: opencloud/bin/ # 焼き上がったバイナリが入っている場所
