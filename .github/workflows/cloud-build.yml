name: OpenCloud Global Build (LS220D)
on: [push] # あなたが git push したら工場が稼働します

jobs:
  armv7-build:
    runs-on: ubuntu-latest # 最新のLinuxサーバーをレンタル
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4 # ソースコード一式を工場に搬入

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # Go職人を呼び出す
        
      - name: Build All Services
        run: |
          # コマンドの頭に直接環境変数を並べることで、確実にビルドに反映させます
          cd opencloud
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 \
          make build \
            TAGS="netgo" \
            LDFLAGS="-s -w"
          



      - name: Archive Production
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-ls220d-binary # 出来上がった製品の名前
          path: opencloud/bin/ # 焼き上がったバイナリが入っている場所
