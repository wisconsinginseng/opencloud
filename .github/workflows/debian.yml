name: Build-OpenCloud-LS220D
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          # standaloneモードを有効にすると、ロックファイルがなくても進めます
          standalone: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # ↓ エラーの原因。キャッシュ機能を一旦オフにして「身軽」にします
          # cache: 'pnpm'

      - name: Force Overwrite Into .bingo
        run: |
          # 1. 確実に存在する絶対パスを取得
          MOCKERY_PATH=$(which mockery)
          OPENAPI_PATH=$(which protoc-gen-openapiv2)
          PROTOC_GEN_GO_PATH=$(which protoc-gen-go)

          # 2. Makefileが「ここだ」と言い張るディレクトリを特定（絶対パスで！）
          TARGET_DIR="${GITHUB_WORKSPACE}/.bingo"
          mkdir -p $TARGET_DIR

          # 3. リンク（-sf）ではなく「コピー」で実体を置く！
          # 名前は Variables.mk が欲しがっている名前に正確に合わせます
          cp $MOCKERY_PATH $TARGET_DIR/mockery-v3.4.0
          cp $OPENAPI_PATH $TARGET_DIR/protoc-gen-openapiv2
          cp $PROTOC_GEN_GO_PATH $TARGET_DIR/protoc-gen-go

          # 4. 最後に「ここにあるぞ」と念押しでPATHを通す
          echo "$TARGET_DIR" >> $GITHUB_PATH

      - name: Stage 1 Generate
        run: make generate
      - name: Stage 2 Prepare Sysroot
        run: |
          mkdir -p $GITHUB_WORKSPACE/sysroot
          curl -L https://github.com/debuerreotype/docker-debian-artifacts/raw/dist-armhf/bookworm/rootfs.tar.xz -o rootfs.tar.xz
          tar -C $GITHUB_WORKSPACE/sysroot -xJf rootfs.tar.xz ./lib/arm-linux-gnueabihf ./usr/lib/arm-linux-gnueabihf ./usr/include ./usr/lib/gcc/arm-linux-gnueabihf
      - name: Stage 3 Install GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Stage 4 Build
        run: |
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          export CGO_ENABLED=1
          SYSROOT=$GITHUB_WORKSPACE/sysroot
          export CGO_CFLAGS="--sysroot=$SYSROOT"
          export CGO_LDFLAGS="--sysroot=$SYSROOT"
          export CC=arm-linux-gnueabihf-gcc
          make -C build
