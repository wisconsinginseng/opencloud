name: Build OpenCloud for ARMv7 (Custom Go)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # ARMv7（32bit）環境をエミュレートして実行
    strategy:
      matrix:
        arch: [armv7]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Debian Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar gcc libc6-dev

      - name: Install Custom Go 1.25.0
        run: |
          # 1. 本物のパッケージをダウンロード
          wget https://github.com/wisconsinginseng/opencloud/releases/download/v1.25-go/go1.25.0-linux-armv7-custom.tar.gz
          
          # 2. /usr/local に直接展開（これで /usr/local/bin/go が出現します）
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf go1.25.0-linux-armv7-custom.tar.gz
          
          # 3. 実行権限を付与（パスに注意！ /go を挟みません）
          sudo chmod +x /usr/local/bin/go
          
          # 4. パスを最優先に設定
          echo "/usr/local/bin" >> $GITHUB_PATH
          
          # 5. 念のための確認（これがログに出れば勝ち！）
          /usr/local/bin/go version    

      - name: Verify Go Version
        run: |
          go version  # ここで "go1.25.1 linux/arm" と出れば勝利です！

      - name: Build OpenCloud
        run: |
          # ここにOpenCloudのビルドコマンドを記述
          # 例: go build -o opencloud-armv7 ./main.go
          export CGO_ENABLED=1
          go build -v -o opencloud-bin ./...

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-armv7-binary
          path: opencloud-bin
