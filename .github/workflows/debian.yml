name: OpenCloud Debian Build (LS220D)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  armv7-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # --- 中間セーブポイント（キャッシュ）の設定 ---
      - name: Cache Build Assets
        id: cache-assets
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            **/protogen
            services/**/gen
            pkg/**/gen
          key: ${{ runner.os }}-opencloud-v1-${{ hashFiles('**/go.sum', '**/*.proto') }}
          restore-keys: |
            ${{ runner.os }}-opencloud-v1-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Full Build Process on ARMv7
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: armv7
          distro: bookworm
          githubToken: ${{ github.token }}
          # ↓ここから下が「コンテナ内で実行される魂の命令」です
          run: |
            set -e
            export GOMAXPROCS=1
            export GOGC=50

            echo "--- Phase 1: OS Packages ---"
            apt-get update && apt-get install -y make gcc g++ git wget curl libc6-dev libcrypt-dev python3 protobuf-compiler xz-utils

            echo "--- Phase 2: Node.js & Go Setup ---"
            if [ ! -f /usr/local/bin/node ]; then
              wget -q https://nodejs.org/dist/v20.18.3/node-v20.18.3-linux-armv7l.tar.xz
              tar -xJf node-v20.18.3-linux-armv7l.tar.xz
              cp -rn node-v20.18.3-linux-armv7l/* /usr/local/
            fi
            npm install -g pnpm
            export PATH=$(npm config get prefix)/bin:$PATH

            if [ ! -d /usr/local/go ]; then
              wget -q https://github.com/wisconsinginseng/opencloud/releases/download/v1.25-go/go1.25.0-linux-armv7-custom.tar.gz
              mkdir -p /usr/local/go
              tar -C /usr/local/go -xzf go1.25.0-linux-armv7-custom.tar.gz
              find /usr/local/go/bin -type f -exec chmod +x {} +
            fi
            ln -sf /usr/local/go/bin/linux_arm/go /usr/local/bin/go
            export PATH=/usr/local/bin:$PATH
            export GOSUMDB=off
            export GOPROXY=https://proxy.golang.org,direct

            echo "--- Phase 4: Conditional Generate ---"
            # キャッシュがあれば重い作業をスキップします
            if [ "${{ steps.cache-assets.outputs.cache-hit }}" != "true" ]; then
              echo "Cache Miss: Generating..."
              go install github.com/bwplotka/bingo@latest
              make -j1 -i generate-prod || true
            else
              echo "Cache Hit: Skipping generate step!"
            fi

            echo "--- Phase 5: Final Build (VCS Checkmate) ---"
            # 監督が見つけた正解「opencloud」ディレクトリでのビルド
            # 1. Gitの所有権警告を完全封鎖
            git config --global --add safe.directory '*'
            
            # 2. VCSスタンプを無効化してビルド完走を狙う
            make -C opencloud build GOFLAGS="-buildvcs=false"

            # 成果物の回収（bin フォルダ内をくまなく探します）
            mkdir -p /home/runner/work/opencloud/opencloud/bin_output
            find . -name "opencloud" -type f -executable -not -path "*/node_modules/*" -exec cp -v {} /home/runner/work/opencloud/opencloud/bin_output/ \;

      - name: Archive Production
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-ls220d-native
          path: bin_output/
