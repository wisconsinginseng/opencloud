name: Build OpenCloud for ARMv7 (Custom Go)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # ARMv7（32bit）環境をエミュレートして実行
    strategy:
      matrix:
        arch: [armv7]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Debian Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar gcc libc6-dev

      - name: Install Custom Go 1.25.0
        run: |
          # 1. 特製Goをダウンロード
          wget https://github.com/wisconsinginseng/opencloud/releases/download/v1.25-go/go1.25.0-linux-armv7-custom.tar.gz
          
          # 2. 既存のGoを一度消去して、確実に上書きする
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf go1.25.0-linux-armv7-custom.tar.gz
          
          # 3. 新しいGoの場所を「最優先」でパスに追加する
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          
          # 4. (念押し) シンボリックリンクを貼り直す
          sudo ln -sf /usr/local/go/bin/go /usr/bin/go\

      - name: Verify Go Version
        run: |
          go version  # ここで "go1.23.1 linux/arm" と出れば勝利です！

      - name: Build OpenCloud
        run: |
          # ここにOpenCloudのビルドコマンドを記述
          # 例: go build -o opencloud-armv7 ./main.go
          export CGO_ENABLED=1
          go build -v -o opencloud-bin ./...

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-armv7-binary
          path: opencloud-bin
