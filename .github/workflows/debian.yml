name: Build OpenCloud for LS220D (ARMv7 Native Cross)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # 安定した標準の64bit Goを使用

      - name: Build Instant 32bit Sysroot (The Kondo Strategy)
        run: |
          # 1. 隔離された部品倉庫を作成
          mkdir -p $GITHUB_WORKSPACE/armhf-sysroot
          cd $GITHUB_WORKSPACE/armhf-sysroot

          # 2. Ubuntuに「armhf（ARMv7用）」の存在を教える（DLのためだけ）
          sudo dpkg --add-architecture armhf
          sudo apt-get update

          # 3. libcryptを含む「有効成分」をファイルとしてDL
          # システムにはインストールせず、ただのファイルとして取得
          apt-get download \
            libc6:armhf \
            libc6-dev:armhf \
            libcrypt1:armhf \
            libcrypt-dev:armhf \
            linux-libc-dev:armhf

          # 4. dpkgを使って倉庫の中に中身だけを展開
          # これにより、64bitシステムとの衝突を完全に回避！
          for f in *.deb; do dpkg -x "$f" .; done

          # 5. コンパイラが見つけやすいようにパスを調整（おまじない）
          ln -s usr/lib/arm-linux-gnueabihf lib/arm-linux-gnueabihf

      - name: Install Cross Compiler Tool
        run: |
          # 32bit部品を接着するための専用工具（GCC）を導入
          sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Build OpenCloud
        run: |
          # --- 監督の理論を実現する魔法の設定 ---
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          export CGO_ENABLED=1
          
          # 「俺が作った倉庫の部品を最優先で使え！」という指示
          SYSROOT=$GITHUB_WORKSPACE/armhf-sysroot
          export CGO_CFLAGS="-I$SYSROOT/usr/include"
          export CGO_LDFLAGS="-L$SYSROOT/lib/arm-linux-gnueabihf -L$SYSROOT/usr/lib/arm-linux-gnueabihf"
          export CC=arm-linux-gnueabihf-gcc
          
          # いざ、ビルド！
          make generate
          make -C build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-ls220d-armv7
          path: |
            build/
            bin/  