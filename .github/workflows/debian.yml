name: OpenCloud Debian Build (LS220D)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  armv7-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # --- ここが重要なおまじない！ ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      # ------------------------------

      - name: Full Build Process on ARMv7
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: armv7
          distro: bookworm
          # 以下、一昨日と同じ内容...          githubToken: ${{ github.token }}
          
          # 部屋の中での作業（インデントに注意！）
          run: |
            echo "--- Phase 1: Installing Native ARM Tools ---"
            apt-get update
            # Debian 12 (armhf) の標準ツールをインストール
            apt-get install -y make gcc g++ git wget curl libc6-dev libcrypt-dev

            # 監督こだわりの Go 1.25 を「部屋の中」でセットアップ
            # --- Phase 2: Setup Custom Go 1.25.0 (監督の黄金手順) ---
            echo "--- Phase 2: Installing Custom Go ---"
            wget https://github.com/wisconsinginseng/opencloud/releases/download/v1.25-go/go1.25.0-linux-armv7-custom.tar.gz
            
            # 1. 展開（sudoは不要です。部屋の中はすでにroot権限なので）
            mkdir -p /usr/local/go
            tar -C /usr/local/go -xzf go1.25.0-linux-armv7-custom.tar.gz
            
            # 2. linux_arm の中にある「本物」に権限付与
            # 監督、ここがポイントでしたね！
            chmod +x /usr/local/go/bin/linux_arm/go
            
            # 3. ツールチェーン全体にも念のため権限を
            chmod -R +x /usr/local/go/pkg/tool/linux_arm/ || true
            
            # 4. 「本物」を /usr/local/bin/go としてリンク
            ln -sf /usr/local/go/bin/linux_arm/go /usr/local/bin/go
            
            # 5. パス設定（部屋の中の環境変数として）
            export PATH=/usr/local/bin:$PATH
            
            # 6. 確認！これが通れば、ついに勝利のファンファーレです
            go version
            
            # ネットワーク設定（GOPROXY）を念のため通す
            export GOPROXY=https://proxy.golang.org,direct

            echo "--- Phase 3: Start make generate ---"
            # 部屋の中は ARM なので、何も考えずに make してOK！
            make generate

            echo "--- Phase 4: Final Build ---"
            mkdir -p bin
            # 部屋の中は ARM なので、CGO_ENABLED=1 だけで本物の ARM バイナリが焼けます
            CGO_ENABLED=1 go build -v -o bin/opencloud ./cmd/opencloud

      - name: Archive Production
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-ls220d-native
          path: bin/
