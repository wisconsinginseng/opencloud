name: Build OpenCloud for ARMv7 (Custom Go)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # ARMv7（32bit）環境をエミュレートして実行
    strategy:
      matrix:
        arch: [armv7]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Debian Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar gcc libc6-dev


      - name: Install Custom Go 1.25.0
        run: |
          # 1. ダウンロード
          wget https://github.com/wisconsinginseng/opencloud/releases/download/v1.25-go/go1.25.0-linux-armv7-custom.tar.gz
          
          # 2. 展開
          sudo mkdir -p /usr/local/go
          sudo tar -C /usr/local/go -xzf go1.25.0-linux-armv7-custom.tar.gz
          
          # 3. 【最重要】中身のツールすべてに実行権限を一括付与！
          # これで "permission denied" を根絶します
          sudo chmod -R +x /usr/local/go/bin/
          sudo chmod -R +x /usr/local/go/pkg/tool/linux_arm/
          
          # 4. シンボリックリンクの作成
          sudo ln -sf /usr/local/go/bin/linux_arm/go /usr/local/bin/go
          
          # 5. パス設定と確認
          echo "/usr/local/bin" >> $GITHUB_PATH
          /usr/local/bin/go version
          
      - name: Build OpenCloud
        run: |
          # 1. CGOとアーキテクチャの明示
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          
          # 2. 【最重要】ネットワーク設定（GOPROXY）の強制セット
          # これで mockery を探しに行けるようになります
          export GOPROXY=https://proxy.golang.org,direct
          
          # 3. 現状確認
          ls -F
          
          # 4. ビルド実行
          # generate で止まらないよう、ツールを先に入れてしまうのも手です
          make generate
          make -C build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-armv7-binary
          # ファイル名ではなく、成果物が溜まっている「ディレクトリ」を指定するのがコツです
          # make -C build の場合、通常は build/bin や bin/ に書き出されます
          path: |
            build/
            bin/    
          
