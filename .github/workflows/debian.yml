name: Build-OpenCloud-LS220D
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          # standaloneモードを有効にすると、ロックファイルがなくても進めます
          standalone: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # ↓ エラーの原因。キャッシュ機能を一旦オフにして「身軽」にします
          # cache: 'pnpm'

      - name: Force Install and Overwrite Into .bingo
        run: |
          # 1. まずは道具を確実にインストール
          go install github.com/vektra/mockery/v2@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-openapiv2@latest
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          
          # 2. Goがインストールした先のパスを特定
          GOBIN_PATH=$(go env GOPATH)/bin
          TARGET_DIR="${GITHUB_WORKSPACE}/.bingo"
          mkdir -p $TARGET_DIR
          
          # 3. 「which」を使わず、フルパスで直接コピー！
          # これなら「見つからない」エラーで止まることはありません
          cp $GOBIN_PATH/mockery $TARGET_DIR/mockery-v3.4.0
          cp $GOBIN_PATH/protoc-gen-openapiv2 $TARGET_DIR/protoc-gen-openapiv2
          cp $GOBIN_PATH/protoc-gen-go $TARGET_DIR/protoc-gen-go
          
          # 4. 最後に念押しで両方にPATHを通す
          echo "$TARGET_DIR" >> $GITHUB_PATH
          echo "$GOBIN_PATH" >> $GITHUB_PATH
      
      - name: Stage 1 Generate
        run: make generate
      - name: Stage 2 Prepare Sysroot
        run: |
          mkdir -p $GITHUB_WORKSPACE/sysroot
          curl -L https://github.com/debuerreotype/docker-debian-artifacts/raw/dist-armhf/bookworm/rootfs.tar.xz -o rootfs.tar.xz
          tar -C $GITHUB_WORKSPACE/sysroot -xJf rootfs.tar.xz ./lib/arm-linux-gnueabihf ./usr/lib/arm-linux-gnueabihf ./usr/include ./usr/lib/gcc/arm-linux-gnueabihf
      - name: Stage 3 Install GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Stage 4 Build
        run: |
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          export CGO_ENABLED=1
          SYSROOT=$GITHUB_WORKSPACE/sysroot
          export CGO_CFLAGS="--sysroot=$SYSROOT"
          export CGO_LDFLAGS="--sysroot=$SYSROOT"
          export CC=arm-linux-gnueabihf-gcc
          make -C build
