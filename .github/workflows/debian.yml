name: Build OpenCloud for ARMv7 (Custom Go)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # ARMv7（32bit）環境をエミュレートして実行
    strategy:
      matrix:
        arch: [armv7]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Debian Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar gcc libc6-dev

      - name: Install Custom Go 1.23.1
        run: |
          # 1. 昨日GitHub Releaseに上げた「自家製Go」をダウンロード
          # ※ URLは実際にアップロードしたファイルのリンクに書き換えてください
          wget https://github.com/wisconsinginseng/opencloud/releases/download/v1.23.1-go/go1.25.0-linux-armv7-custom.tar.gz 
          
          # 2. /usr/local に展開（既存のGoがあれば上書き）
          sudo tar -C /usr/local -xzf go1.25.0-linux-armv7-custom.tar.gz
          
          # 3. パスを通す
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Verify Go Version
        run: |
          go version  # ここで "go1.23.1 linux/arm" と出れば勝利です！

      - name: Build OpenCloud
        run: |
          # ここにOpenCloudのビルドコマンドを記述
          # 例: go build -o opencloud-armv7 ./main.go
          export CGO_ENABLED=1
          go build -v -o opencloud-bin ./...

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-armv7-binary
          path: opencloud-bin
