name: OpenCloud Debian Build (LS220D)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# --- 警告を黙らせるおまじないを追加 ---
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  armv7-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Full Build Process on ARMv7
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: armv7
          distro: bookworm
          githubToken: ${{ github.token }}
          
          run: |
            set -e

            echo "--- Phase 1: Installing Tools (Manual Node 20) ---"
            apt-get update
            apt-get install -y make gcc g++ git wget curl libc6-dev libcrypt-dev \
                               python3 protobuf-compiler xz-utils
            
            # Node 20 手動インストール
            wget https://nodejs.org/dist/v20.18.3/node-v20.18.3-linux-armv7l.tar.xz
            tar -xJf node-v20.18.3-linux-armv7l.tar.xz
            cp -rn node-v20.18.3-linux-armv7l/* /usr/local/
            
            # pnpm 導入
            npm install -g pnpm
            export PATH=$(npm config get prefix)/bin:$PATH

            echo "--- Phase 2: Installing Custom Go (監督の黄金手順 改) ---"
            wget https://github.com/wisconsinginseng/opencloud/releases/download/v1.25-go/go1.25.0-linux-armv7-custom.tar.gz
            mkdir -p /usr/local/go
            tar -C /usr/local/go -xzf go1.25.0-linux-armv7-custom.tar.gz
            
            # --- ここを強化！ ---
            # bin の中だけでなく、pkg/tool の中のコンパイラにも権限を付与します
            find /usr/local/go/bin -type f -exec chmod +x {} +
            find /usr/local/go/pkg/tool -type f -exec chmod +x {} +
            
            ln -sf /usr/local/go/bin/linux_arm/go /usr/local/bin/go
            export PATH=/usr/local/bin:$PATH

            echo "--- Phase 3: Pre-installing Heavy Tools (個別撃破作戦) ---"
            # セキュリティチェックをOFFにして、重いツールを先にビルド
            export GOSUMDB=off
            export GOPROXY=direct
            export GOPATH=$HOME/go
            export PATH=$PATH:$(go env GOPATH)/bin
            
            echo "Installing bingo..."
            go install github.com/bwplotka/bingo@latest
            
            echo "Installing mockery (This is the 40-min wall!) ---"
            # ここでわざと verbose(-v) を付けて、進捗を可視化します！
            go install -v github.com/vektra/mockery/v3@v3.4.0 || true

            echo "--- Phase 4: Start make generate ---"
            # 並列数を 1 に制限して、メモリ不足によるフリーズを防ぎます
            make -j1 generate-prod

            echo "--- Phase 5: Final Build ---"
            mkdir -p bin
            CGO_ENABLED=1 go build -v -o bin/opencloud ./cmd/opencloud

      - name: Archive Production
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-ls220d-native
          path: bin/
