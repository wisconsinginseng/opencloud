name: OpenCloud Debian Build (LS220D)
on: [push]

jobs:
  armv7-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build in Debian Bookworm (ARMv7)
        
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: armv7
          distro: bookworm        # ← ここで Debian Bookworm を指名！
          githubToken: ${{ github.token }}

          # 仮想部屋の中での作業指示
          run: |
            # 1. 必要な道具を揃える（Debian公式なので404になりません！）
            apt-get update
            apt-get install -y golang-go libcrypt-dev gcc git

            # 2. ビルド実行
            cd opencloud
            go mod vendor
            
            # 仮想環境内がすでに ARMv7 なので、複雑なクロスコンパイル設定は不要！
            CGO_ENABLED=1 \
            go build -v -tags 'netgo' -ldflags '-s -w' -o bin/opencloud ./cmd/opencloud

      - name: Archive Production
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-ls220d-debian
          path: opencloud/bin/
