name: Build OpenCloud for ARMv7 (Custom Go)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # ARMv7（32bit）環境をエミュレートして実行
    strategy:
      matrix:
        arch: [armv7]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Debian Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar gcc libc6-dev


      - name: Install Custom Go 1.25.0
        run: |
          # 1. ダウンロード
          wget https://github.com/wisconsinginseng/opencloud/releases/download/v1.25-go/go1.25.0-linux-armv7-custom.tar.gz
          
          # 2. 一旦 /usr/local/go にすべて展開
          sudo mkdir -p /usr/local/go
          sudo tar -C /usr/local/go -xzf go1.25.0-linux-armv7-custom.tar.gz
          
          # 3. linux_arm の中にある「本物」に、外からでもアクセスできるように権限付与
          sudo chmod +x /usr/local/go/bin/linux_arm/go
          
          # 4. 「本物」を /usr/local/bin/go として表舞台に立たせる（シンボリックリンク）
          sudo ln -sf /usr/local/go/bin/linux_arm/go /usr/local/bin/go
          
          # 5. パスを最優先に設定
          echo "/usr/local/bin" >> $GITHUB_PATH
          
          # 6. 最終確認（これで 1.25.0 が出れば、全工程終了です！）
          /usr/local/bin/go version


      - name: Build OpenCloud
        run: |
          # ここにOpenCloudのビルドコマンドを記述
          # 例: go build -o opencloud-armv7 ./main.go
          export CGO_ENABLED=1
          go build -v -o opencloud-bin ./...

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-armv7-binary
          path: opencloud-bin
