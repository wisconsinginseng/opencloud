name: OpenCloud Debian Build (LS220D)
on: [push]

jobs:
  armv7-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Full Build Process
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: armv7
          distro: bookworm
          githubToken: ${{ github.token }}
          # 【重要】runはwithの中に一段（スペース2個分）下げて書きます
          run: |

            # --- 第1段階: 環境整備とGoのインストール ---
            echo "--- Phase 1: Installing Environment ---"
            rm -f /etc/apt/sources.list.d/*.list
            apt-get update
            apt-get install -y libcrypt-dev gcc git wget curl

            # 公式のインストールスクリプト(go-install)を使って自動導入
            curl -L https://git.io/vQhWE | bash -s -- --version 1.23.0
            
            # パスを通す（スクリプトのデフォルト位置）
            export PATH=$PATH:/usr/local/go/bin
            go version
            
            # --- 第2段階: Goモジュールの整理 (go mod) ---
            echo "--- Phase 2: Go Mod Tidy ---"
            go mod tidy

            # --- 第3段階: 依存ライブラリのダウンロード (vendor) ---
            echo "--- Phase 3: Go Mod Vendor ---"
            go mod vendor

            # --- 第4段階: CGOを有効にしてビルド ---
            echo "--- Phase 4: Final Build ---"
            mkdir -p bin
            CGO_ENABLED=1 \
            go build -v -tags 'netgo' -ldflags '-s -w' -o bin/opencloud ./cmd/opencloud

      - name: Archive Production
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-ls220d-debian
          path: bin/
