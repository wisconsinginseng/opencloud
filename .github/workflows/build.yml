name: Build OpenCloud for LS220D

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Go環境のセットアップ (最新の1.26を指定)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      # 2. Node.js & pnpm 環境のセットアップ (フロントエンド用)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 安定版の20を指定

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # プロジェクトの要求に合わせて調整してください
          run_install: true

      # 3. クロスコンパイラのインストール
      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf make

      # 4. LS220D純正ライブラリの調達
      - name: Download Guest Libraries
        run: |
          mkdir -p ${{ github.workspace }}/guest_libs
          cd ${{ github.workspace }}/guest_libs
          
          # 監督が提示された「本物のライブラリ」を1つずつ正確に収集します
          curl -L -O https://github.com/wisconsinginseng/opencloud/releases/download/libcrypt/ld-linux-armhf.so.3
          curl -L -O https://github.com/wisconsinginseng/opencloud/releases/download/libcrypt/libcrypt.so.1
          curl -L -O https://github.com/wisconsinginseng/opencloud/releases/download/libcrypt/libc.so.6
          curl -L -O https://github.com/wisconsinginseng/opencloud/releases/download/libcrypt/libcrypto.so.3

          # リンカ(-lcryptなど)が認識できるようにシンボリックリンクを作成
          ln -s libcrypt.so.1 libcrypt.so
          ln -s libcrypto.so.3 libcrypto.so

      # 5. ビルド実行 (Makeを使用)
      - name: Build with Make
        run: |
          # 1. 環境整備と道具出し（ここは完璧です）
          export GOBIN="${{ github.workspace }}/.bingo"
          export PATH="$GOBIN:$PATH"
          make -C services/thumbnails protoc-deps
          make -C services/settings protoc-deps

          # 2. 生成工程（監督の確認通り、ここもパス！）
          make generate

      - name: Debug Library Path
        run: |
          echo "--- Checking guest_libs contents ---"
          find ${{ github.workspace }}/guest_libs -maxdepth 2
          echo "------------------------------------"
      
      - name: Modernize and Tidy
        run: |
          # 1. go.mod のみを厳密に狙い撃ちして 1.23 に更新
          find . -name "go.mod" -exec sed -i 's/^go 1.21/go 1.23/g' {} +

          # 2. Makefile のターゲットに頼らず、Go コマンドを直接全ディレクトリで実行
          # これなら 'No rule to make target' は起きません！
          find . -name "go.mod" -execdir go mod tidy \;

      - name: Build for ARMv7
        run: |
          export GOBIN="${{ github.workspace }}/.bingo"
          export PATH="$GOBIN:$PATH"
          
          # 3. 本番ビルド（GUEST_LIBS_PATH は絶対パスで！）
          make -C opencloud build-armv7 \
            GUEST_LIBS_PATH=${{ github.workspace }}/guest_libs \
            V=1
    
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-ls220d-binary
          # 生成されたバイナリのパスに合わせて調整してください
          path: build/bin/opencloud
