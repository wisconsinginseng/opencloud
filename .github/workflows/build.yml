name: Build OpenCloud for LS220D

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Go環境のセットアップ (最新の1.26を指定)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      # 2. Node.js & pnpm 環境のセットアップ (フロントエンド用)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 安定版の20を指定

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # プロジェクトの要求に合わせて調整してください
          run_install: true

      # 3. クロスコンパイラのインストール
      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf make

      # 4. LS220D純正ライブラリの調達
      - name: Download LS220D Native Libraries
        run: |
          curl -L https://github.com/wisconsinginseng/opencloud/archive/refs/tags/libcrypt.tar.gz -o libs.tar.gz
          mkdir -p guest_libs
          tar -xzf libs.tar.gz -C guest_libs --strip-components=1

      # 5. ビルド実行 (Makeを使用)
      - name: Build with Make
        run: |
          # 1. まずは準備工程 (generate)
          # ここでは標準の環境（x86）で動くツール類を生成させるため、
          # あえて特別な LDFLAGS は渡さずに実行します。
          make generate

          # 2. 本番ビルド (opencloud)
          # ここで満を持して、監督が救出した純正ライブラリを投入します！
          # CGO_LDFLAGS を引数として直接渡すことで、このステップに「だけ」効かせます。
          make opencloud -C build \
            CGO_ENABLED=1 \
            GOOS=linux \
            GOARCH=arm \
            GOARM=7 \
            CC=arm-linux-gnueabihf-gcc \
            CGO_LDFLAGS="-L${{ github.workspace }}/guest_libs -lcrypt -lcrypto"
            
          # 監督指定のコマンド手順
          make generate
          make opencloud -C build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-ls220d-binary
          # 生成されたバイナリのパスに合わせて調整してください
          path: build/bin/opencloud
