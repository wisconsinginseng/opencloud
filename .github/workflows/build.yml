name: Build OpenCloud for LS220D

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # 1.21 から 1.24 以上へアップデートします
          go-version: '1.24' 
          # もし vendor フォルダを使っている場合は cache も有効にすると速いです
          cache: true
          
      - name: Install Cross-Compiler (arm-linux-gnueabihf)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Download LS220D Native Libraries
        run: |
          # 監督が作成されたリリースタグのURLから資材を確保
          curl -L https://github.com/wisconsinginseng/opencloud/archive/refs/tags/libcrypt.tar.gz -o libs.tar.gz
          mkdir -p guest_libs
          # --strip-components=1 で、フォルダの中身だけを guest_libs に展開
          tar -xzf libs.tar.gz -C guest_libs --strip-components=1
          
          # 現場確認（ログに中身を表示して、安心感を得るためのステップ）
          echo "--- Downloaded Libraries ---"
          ls -l guest_libs

      - name: Build for LS220D (ARMv7)
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: arm
          GOARM: 7
          CC: arm-linux-gnueabihf-gcc
          # 【監督、ここがポイント！】
          # -L で確保したライブラリパスを通し、-lcrypt を指名します
          CGO_LDFLAGS: "-L${{ github.workspace }}/guest_libs -lcrypt -lcrypto"
        run: |
          # ビルド実行。バイナリ名は分かりやすく ls220d を付与
          go build -v -o opencloud_ls220d

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencloud-ls220d-binary
          path: opencloud_ls220d
