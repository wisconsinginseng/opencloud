name: DIRECTORS-SPECIAL-BUILD

on:
  push:
    branches:
      - main  # mainブランチに書き込みがあったら即実行！
    tags:
      - 'v*'

jobs:
  build-and-vendor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # 1. 監督特製GoをReleaseから召喚（自動追跡モード）
      - name: Setup Custom Go (The Director's Special)
        run: |
          wget -q https://github.com/wisconsinginseng/opencloud/releases/download/v1.25-go/go1.25.0-linux-armv7-custom.tar.gz
          
          # 混乱を防ぐため、一度まっさらにして展開
          sudo rm -rf /opt/go-custom
          sudo mkdir -p /opt/go-custom
          sudo tar -C /opt/go-custom -xzf go1.25.0-linux-armv7-custom.tar.gz
          
          # 【ここが重要】展開された「bin」フォルダがどこにあるか自動で探す
          # 監督のGoが「go/bin」という階層なら、それを見つけ出します
          REAL_GO_PATH=$(find /opt/go-custom -name go -type f -executable | sed 's/\/go$//' | head -n 1)
          
          if [ -n "$REAL_GO_PATH" ]; then
            echo "Found Go at: $REAL_GO_PATH"
            echo "$REAL_GO_PATH" >> $GITHUB_PATH
          else
            echo "Error: Could not find go binary in the archive!"
            exit 1
          fi
          
          # 標準のGoは消さずに、今のパスを「最優先」にするだけで十分です

          

          
      # 2. 監督のGoで材料をパッキング
      - name: Prepare Materials (Vendor)
        working-directory: ./opencloud
        run: |
          go version
          go mod vendor
          # 備蓄セットをリポジトリルートに作成
          tar -czf ../opencloud-ls220d-source-kit.tar.gz .

      # 3. 同じGoでバイナリを焼き、備蓄セットと共にReleaseへ
      - name: Build & Release
        working-directory: ./opencloud
        run: |
          mkdir -p bin
          go build -mod=vendor -o bin/opencloud ./cmd/opencloud

      # 4. 成果物をReleaseにアップロード（これがないと備蓄されません！）
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            opencloud-ls220d-source-kit.tar.gz
            opencloud/bin/opencloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
