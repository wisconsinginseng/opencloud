name: DIRECTORS-SPECIAL-BUILD

on:
  push:
    tags:
      - 'v*' # v1.0.0などのタグをpushした時に動きます

jobs:
  build-and-vendor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # 1. 監督特製GoをReleaseから召喚
      - name: Setup Custom Go (The Director's Special)
        run: |
          # URLの「hhttps」を「https」に修正しました
          wget -q https://github.com/wisconsinginseng/opencloud/releases/download/v1.25-go/go1.25.0-linux-armv7-custom.tar.gz
          sudo tar -C /usr/local -xzf go1.25.0-linux-armv7-custom.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      # 2. 監督のGoで材料をパッキング
      - name: Prepare Materials (Vendor)
        working-directory: ./opencloud
        run: |
          go version
          go mod vendor
          # 備蓄セットをリポジトリルートに作成
          tar -czf ../opencloud-ls220d-source-kit.tar.gz .

      # 3. 同じGoでバイナリを焼き、備蓄セットと共にReleaseへ
      - name: Build & Release
        working-directory: ./opencloud
        run: |
          mkdir -p bin
          go build -mod=vendor -o bin/opencloud ./cmd/opencloud

      # 4. 成果物をReleaseにアップロード（これがないと備蓄されません！）
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            opencloud-ls220d-source-kit.tar.gz
            opencloud/bin/opencloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
