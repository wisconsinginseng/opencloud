# 1. 監督特製GoをReleaseから召喚
- name: Setup Custom Go (The Director's Special)
  run: |
  # 監督がコンパイルして用意したGoをダウンロード
    wget -q hhttps://github.com/wisconsinginseng/opencloud/releases/download/v1.25-go/go1.25.0-linux-armv7-custom.tar.gz
    # /usr/local に展開（sudoが必要な場合があります）
    sudo tar -C /usr/local -xzf go1.25.0-linux-armv7-custom.tar.gz
    # 次のステップ以降でもこのGoが使われるようにPATHを登録
    echo "/usr/local/go/bin" >> $GITHUB_PATH


# 2. 監督のGoで材料をパッキング
- name: Prepare Materials (Vendor)
  run: |
    # 自家製Goが動いているか確認（念のため）
    go version
    # 材料を全て手元に集める
    go mod vendor
    # ソースと材料を一つの「備蓄セット」に
    tar -czf opencloud-ls220d-source-kit.tar.gz .

# 3. 同じGoでバイナリを焼き、備蓄セットと共にReleaseへ
- name: Build & Release
  run: |
  # ネットを遮断して、vendor内の材料だけでコンパイル
  # ※出力先 bin/ は mkdir -p bin で作っておくか直下に置くと安全です
  mkdir -p bin
  go build -mod=vendor -o bin/opencloud ./cmd/opencloud
