name: DIRECTORS-SPECIAL-BUILD

on:
  push:
    branches:
      - main  # mainブランチに書き込みがあったら即実行！
    tags:
      - 'v*'

jobs:
  build-and-vendor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # 1. 監督特製GoをReleaseから召喚
      - name: Setup Custom Go (The Director's Special)
        run: |
          # 監督がコンパイルしたGoをダウンロード
          wget -q https://github.com/wisconsinginseng/opencloud/releases/download/v1.25-go/go1.25.0-linux-armv7-custom.tar.gz
          
          # /usr/local/go-dist に展開（標準の /usr/local/go と被らないようにする）
          sudo mkdir -p /usr/local/go-dist
          sudo tar -C /usr/local/go-dist -xzf go1.25.0-linux-armv7-custom.tar.gz
          
          # 展開されたディレクトリの構造を確認しつつ、PATHを通す
          # 恐らく /usr/local/go-dist/go/bin に実行ファイルがあります
          echo "/usr/local/go-dist/go/bin" >> $GITHUB_PATH
          
          # 【重要】標準のGo（1.24）を無効化するおまじない
          sudo mv /usr/bin/go /usr/bin/go.old || true

          
      # 2. 監督のGoで材料をパッキング
      - name: Prepare Materials (Vendor)
        working-directory: ./opencloud
        run: |
          go version
          go mod vendor
          # 備蓄セットをリポジトリルートに作成
          tar -czf ../opencloud-ls220d-source-kit.tar.gz .

      # 3. 同じGoでバイナリを焼き、備蓄セットと共にReleaseへ
      - name: Build & Release
        working-directory: ./opencloud
        run: |
          mkdir -p bin
          go build -mod=vendor -o bin/opencloud ./cmd/opencloud

      # 4. 成果物をReleaseにアップロード（これがないと備蓄されません！）
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            opencloud-ls220d-source-kit.tar.gz
            opencloud/bin/opencloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
